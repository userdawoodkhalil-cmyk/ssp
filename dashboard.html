<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<!-- CACHE BUSTER (IMPORTANT) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="../assets/js/theme.js?v=1.0.1"></script>

<style>

:root {
  --bg: #050812;
  --primary: #4db8ff;
  --text: #eaf2ff;
  --glass: rgba(255,255,255,0.06);
  --stroke: rgba(255,255,255,0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  overflow-x: hidden;
}

/* background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,140,255,0.25), transparent 55%),
    radial-gradient(circle at 80% 80%, rgba(0,255,200,0.12), transparent 55%);
  z-index: -1;
}

/* sidebar */
.sidebar {
  width: 250px;
  height: 100vh;
  padding: 25px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(25px);
  border-right: 1px solid var(--stroke);
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  color: var(--primary);
  margin-bottom: 20px;
}

.sidebar button {
  padding: 12px;
  margin: 4px 0;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: #bbb;
  text-align: left;
  cursor: pointer;
  transition: 0.3s;
}

.sidebar button:hover {
  background: var(--primary);
  color: black;
  transform: translateX(6px);
}

/* main */
.main {
  flex: 1;
  padding: 30px;
}

/* top */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

/* stats */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.stat-box {
  padding: 18px;
  border-radius: 14px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--stroke);
}

/* cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 18px;
}

.card {
  padding: 18px;
  border-radius: 16px;
  background: var(--glass);
  backdrop-filter: blur(25px);
  border: 1px solid var(--stroke);
}

/* actions */
.action-grid {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
  gap: 12px;
}

.action-grid button {
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--glass);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.action-grid button:hover {
  background: var(--primary);
  color: black;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 SSP</h2>

  <button onclick="go('analytics.html')">📊 Analytics</button>
  <button onclick="go('weak.html')">⚠️ Weak</button>
  <button onclick="go('revision.html')">🔄 Revision</button>
  <button onclick="go('recommendation.html')">🤖 AI</button>
  <button onclick="go('profile.html')">👤 Profile</button>
  <button onclick="go('leaderboard.html')">🏆 Leaderboard</button>
  <button onclick="go('reminder.html')">⏰ Reminder</button>
  <button onclick="go('admin.html')">⚙️ Admin</button>

  <button onclick="logoutUser()">🚪 Logout</button>
</div>

<div class="main">

  <div class="top-bar">
    <h1 id="greeting">👋 Welcome</h1>
  </div>

  <div class="stats">
    <div class="stat-box">
      <h3>🔥 Streak</h3>
      <p id="streak">0 days</p>
    </div>

    <div class="stat-box">
      <h3>💡 Motivation</h3>
      <p id="motivation">Loading...</p>
    </div>
  </div>

  <div class="grid" id="cards"></div>

  <div class="action-grid">
    <button onclick="go('videos.html')">🎥 Video Learning</button>
    <button onclick="go('planner.html')">🧠 Study Planner</button>
    <button onclick="go('notes.html')">📝 Notes</button>
    <button onclick="go('ai-school.html')">🏫 AI School</button>
    <button onclick="go('ai-chat.html')">🤖 AI Teacher</button>
  </div>

</div>

<script>
//cachee
(function () {
  const version = Date.now();
  document.querySelectorAll("script[src]").forEach(s => {
    s.src += "?v=" + version;
  });
})();

/* NAV */
window.go = (p) => window.location.href = p;

/* LOGOUT */
window.logoutUser = () => {
  localStorage.removeItem("currentUser");
  window.location.href = "/index.html";
};

/* FIX MOTIVATION (NO FREEZE EVER) */
const m = document.getElementById("motivation");
const quotes = [
  "Stay consistent 🔥",
  "Small steps daily",
  "You are improving",
  "Success needs discipline"
];

if (m) {
  m.innerText = quotes[Math.floor(Math.random() * quotes.length)];
}

/* GREETING */
const g = document.getElementById("greeting");
let h = new Date().getHours();

if (g) {
  g.innerText =
    h < 12 ? "🌅 Good Morning" :
    h < 18 ? "🌤️ Good Afternoon" : "🌙 Good Evening";
}

/* STREAK SAFE */
const s = document.getElementById("streak");
let streak = localStorage.getItem("streak") || 0;
if (s) s.innerText = streak + " days";

/* TEST */
console.log("Dashboard loaded ✔");

</script>

</body>
</html>
