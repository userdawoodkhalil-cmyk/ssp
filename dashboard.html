<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="../assets/js/theme.js"></script>

<style>

:root {
  --bg: #050812;
  --primary: #4db8ff;
  --text: #eaf2ff;
  --glass: rgba(255,255,255,0.06);
  --stroke: rgba(255,255,255,0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,140,255,0.25), transparent 55%),
    radial-gradient(circle at 80% 80%, rgba(0,255,200,0.12), transparent 55%);
  z-index: -1;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  height: 100vh;
  padding: 25px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(25px);
  border-right: 1px solid var(--stroke);
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  color: var(--primary);
  margin-bottom: 20px;
}

.sidebar button {
  padding: 12px;
  margin: 4px 0;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: #bbb;
  text-align: left;
  cursor: pointer;
  transition: 0.3s;
}

.sidebar button:hover {
  background: var(--primary);
  color: black;
  transform: translateX(6px);
}

/* MAIN */
.main {
  flex: 1;
  padding: 30px;
}

/* TOP */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.stat-box {
  padding: 18px;
  border-radius: 14px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--stroke);
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 18px;
}

.card {
  padding: 18px;
  border-radius: 16px;
  background: var(--glass);
  backdrop-filter: blur(25px);
  border: 1px solid var(--stroke);
}

/* ACTIONS */
.action-grid {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
  gap: 12px;
}

.action-grid button {
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--glass);
  color: white;
  cursor: pointer;
}

.action-grid button:hover {
  background: var(--primary);
  color: black;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚀 SSP</h2>

  <button onclick="go('analytics.html')">📊 Analytics</button>
  <button onclick="go('weak.html')">⚠️ Weak</button>
  <button onclick="go('revision.html')">🔄 Revision</button>
  <button onclick="go('recommendation.html')">🤖 AI</button>
  <button onclick="go('profile.html')">👤 Profile</button>
  <button onclick="go('leaderboard.html')">🏆 Leaderboard</button>
  <button onclick="go('reminder.html')">⏰ Reminder</button>
  <button onclick="go('admin.html')">⚙️ Admin</button>

  <button onclick="logoutUser()">🚪 Logout</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="top-bar">
    <h1 id="greeting">👋 Welcome</h1>
  </div>

  <div class="stats">
    <div class="stat-box">
      <h3>🔥 Streak</h3>
      <p id="streak">0 days</p>
    </div>

    <div class="stat-box">
      <h3>💡 Motivation</h3>
      <p id="motivation"></p>
    </div>
  </div>

  <div class="grid" id="cards"></div>

  <div class="action-grid">
    <button onclick="go('videos.html')">🎥 Video Learning</button>
    <button onclick="go('planner.html')">🧠 Study Planner</button>
    <button onclick="go('notes.html')">📝 Notes</button>
    <button onclick="window.location.href='ai-school.html'">🏫 AI School</button>
    <button onclick="window.location.href='ai-chat.html'">🤖 AI Teacher</button>
  </div>

</div>

<script type="module">

import { db, doc, getDoc } from "../assets/js/firebase.js";

document.addEventListener("DOMContentLoaded", () => {

  const user = localStorage.getItem("currentUser");
  if (!user) window.location.href = "../index.html";

  window.go = (p) => window.location.href = p;

  window.logoutUser = () => {
    localStorage.removeItem("currentUser");
    window.location.href = "../index.html";
  };

  /* MOTIVATION FIX */
  const quotes = [
    "Stay consistent 🔥",
    "Small steps daily",
    "You are improving",
    "Success needs discipline"
  ];

  document.getElementById("motivation").innerText =
    quotes[Math.floor(Math.random() * quotes.length)];

  /* GREETING */
  let h = new Date().getHours();
  document.getElementById("greeting").innerText =
    h < 12 ? "🌅 Good Morning" :
    h < 18 ? "🌤️ Good Afternoon" : "🌙 Good Evening";

  /* STREAK */
  let streak = localStorage.getItem("streak") || 0;
  document.getElementById("streak").innerText = streak + " days";

  /* DASHBOARD LOAD */
  async function loadDashboard() {
    const container = document.getElementById("cards");

    const [subjectsRes, userSnap] = await Promise.all([
      fetch("../assets/data/subject.json"),
      getDoc(doc(db, "users", user))
    ]);

    const subjects = await subjectsRes.json();
    const progress = (userSnap.data() || {}).progress || {};

    container.innerHTML = "";

    Object.keys(subjects).forEach(subj => {
      let total = 0, done = 0;

      Object.keys(subjects[subj]).forEach(chap => {
        subjects[subj][chap].forEach((_, i) => {
          total++;
          if (progress[`${subj}-${chap}-${i}`]) done++;
        });
      });

      const percent = total ? Math.round((done / total) * 100) : 0;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${subj}</h3>
        <p>${percent}% Complete</p>
        <button onclick="go('chapters.html?subject=${subj}')">Open</button>
      `;

      container.appendChild(div);
    });
  }

  loadDashboard();

});

</script>

</body>
</html>
