<body>







<div class="container">
  <h2>Register</h2><br>
  <input type="email" id="register-email" placeholder="Email"><br><br>
  <input type="password" id="register-password" placeholder="Password"><br><br>
  <button onclick="registerUser()">Register</button>
</div>

<script type="module">
import { auth, createUserWithEmailAndPassword, signInWithEmailAndPassword, db, doc, setDoc } from "./assets/js/firebase.js";

// 🔹 Register
async function register(email, password) {
  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db, "users", user.uid), {
      progress: {},
      weakTopics: {}
    });

    alert("✅ Registration successful! Please login.");
  } catch (err) {
    alert("❌ Registration failed: " + err.message);
  }
}



// 🔹 Buttons
window.registerUser = () => {
  const email = document.getElementById("register-email").value.trim();
  const password = document.getElementById("register-password").value.trim();
  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }
  register(email, password);
};


</script>
