<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz</title>
<link rel="stylesheet" href="../assets/css/style.css">
<script src="../assets/js/theme.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
.question {
    padding: 10px;
    margin: 10px 0;
    background: #f5f5f5;
    border-radius: 8px;
}
.correct { background-color: #28a745; color: white; }
.wrong { background-color: #dc3545; color: white; }
#timer { font-size: 20px; font-weight: bold; color: red; }
button { padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<h1>Quiz</h1>
<p id="timer">Time: 60</p>

<div id="quiz-container">Loading quiz...</div>

<button id="submitBtn">Submit Quiz</button>

<h2 id="result"></h2>

<script type="module">
import { db, doc, getDoc, setDoc } from "../assets/js/firebase.js";

// 🔐 Check login
const user = localStorage.getItem("currentUser");
if (!user) window.location.href = "../index.html";

const userRef = doc(db, "users", user);

// 📌 Get subject from URL
const urlParams = new URLSearchParams(window.location.search);
const subject = urlParams.get("subject") || "Physics";

const container = document.getElementById("quiz-container");
const result = document.getElementById("result");

let quizData = {};
let progress = {};
let weakTopics = {};

// ⏱️ TIMER
let timeLeft = 60;
const timerEl = document.getElementById("timer");

const timer = setInterval(() => {
    timeLeft--;
    timerEl.textContent = "Time: " + timeLeft;

    if (timeLeft <= 0) {
        clearInterval(timer);
        submitQuiz();
    }
}, 1000);

// 🚀 LOAD QUIZ
async function loadQuiz() {
    try {
        // Load Firebase data + quiz.json together
        const [userSnap, res] = await Promise.all([
            getDoc(userRef),
            fetch("../assets/data/quiz.json")
        ]);

        const userData = userSnap.data() || {};
        progress = userData.progress || {};
        weakTopics = userData.weakTopics || {};

        const allData = await res.json();

        if (!allData[subject]) {
            container.innerHTML = "<h2>❌ No quiz found for: " + subject + "</h2>";
            return;
        }

        quizData = allData[subject];
        container.innerHTML = "";

        Object.keys(quizData).forEach(chap => {
            quizData[chap].forEach((qObj, idx) => {
                const key = `${subject}-${chap}-${idx}`;

                const div = document.createElement("div");
                div.className = "question";

                div.innerHTML = `
                    <p><b>${qObj.q}</b></p>
                    ${qObj.options.map((opt, i) =>
                        `<label id="${key}_${i}">
                            <input type="radio" name="${key}" value="${i}">
                            ${opt}
                        </label><br>`
                    ).join("")}
                `;

                container.appendChild(div);
            });
        });

    } catch (err) {
        console.error(err);
        container.innerHTML = "<h2>❌ Error loading quiz</h2>";
    }
}

// ✅ SUBMIT QUIZ
async function submitQuiz() {
    clearInterval(timer);

    let score = 0;
    let total = 0;

    Object.keys(quizData).forEach(chap => {
        quizData[chap].forEach((qObj, idx) => {
            total++;

            const key = `${subject}-${chap}-${idx}`;
            const selected = document.querySelector(`input[name="${key}"]:checked`);

            // Highlight correct
            document.getElementById(`${key}_${qObj.answer}`).classList.add("correct");

            if (selected && parseInt(selected.value) === qObj.answer) {
                score++;
                progress[key] = true;
                delete weakTopics[key];
            } else {
                weakTopics[key] = qObj.q;

                if (selected) {
                    document.getElementById(`${key}_${selected.value}`).classList.add("wrong");
                }
            }
        });
    });

    const percent = Math.round((score / total) * 100);

    result.innerHTML = `
        Score: ${score}/${total} <br>
        Percentage: ${percent}% ${percent >= 50 ? "✅ Pass" : "❌ Fail"}
    `;

    // Save to Firebase
    await setDoc(userRef, {
        progress: progress,
        weakTopics: weakTopics
    });

    document.getElementById("submitBtn").disabled = true;
}

// Button click
document.getElementById("submitBtn").onclick = submitQuiz;

// Load quiz
loadQuiz();
</script>

</body>
</html>
