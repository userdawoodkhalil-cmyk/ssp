<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Topics</title>
<link rel="stylesheet" href="../assets/css/style.css">
<script src="../assets/js/theme.js"></script>
<style>
.card { padding: 12px; border-radius: 10px; background-color: #f5f5f5; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin: 8px; cursor: pointer; }
.done { background-color: #28a745 !important; color: white; }
</style>
</head>
<body>

<h1 id="chapter-title"></h1>
<div id="topics-container"></div>

<script type="module">
import { db, doc, getDoc, setDoc } from "../assets/js/firebase.js";

const user = localStorage.getItem("currentUser");
if (!user) window.location.href = "../index.html";

const urlParams = new URLSearchParams(window.location.search);
const subject = urlParams.get("subject");
const chapter = urlParams.get("chapter");

if (!subject || !chapter) window.location.href = "dashboard.html";

document.getElementById("chapter-title").textContent = `${subject} → ${chapter}`;

const userRef = doc(db, "users", user);

async function loadTopics() {
    const subjects = await (await fetch("../assets/data/subject.json")).json();
    const topics = subjects[subject][chapter];
    const snap = await getDoc(userRef);
    const userData = snap.data() || {};
    const progress = userData.progress || {};

    const container = document.getElementById("topics-container");
    container.innerHTML = "";

    topics.forEach((topicName, idx) => {
        const key = `${subject}-${chapter}-${idx}`;
        const div = document.createElement("div");
        div.className = "card";
        div.textContent = topicName;
        if (progress[key]) div.classList.add("done");

        div.onclick = async () => {
            progress[key] = true;
            await setDoc(userRef, { progress: progress, weakTopics: userData.weakTopics || {} });
            div.classList.add("done");
        };

        container.appendChild(div);
    });
}

loadTopics();
</script>

</body>
</html>
