<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Reminder</title>
<link rel="stylesheet" href="../assets/css/style.css">
<script src="../assets/js/theme.js"></script>

<style>
body { font-family: Arial; padding: 20px; }

.card {
    background: #f5f5f5;
    padding: 15px;
    border-radius: 10px;
    margin: 10px 0;
}

.popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #28a745;
    color: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<h1>📅 Daily Study Reminder</h1>

<div id="stats" class="card"></div>

<div id="popup" class="popup" style="display:none;"></div>

<script type="module">
import { db, doc, getDoc, setDoc } from "../assets/js/firebase.js";

// 🔐 Check login
const user = localStorage.getItem("currentUser");
if (!user) window.location.href = "../index.html";

const userRef = doc(db, "users", user);

async function loadReminder() {
    const snap = await getDoc(userRef);
    const userData = snap.data() || {};

    let lastStudy = userData.lastStudy || null;
    let streak = userData.streak || 0;

    const today = new Date().toDateString();

    // 🔥 Check streak logic
    if (lastStudy !== today) {

        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);

        if (lastStudy === yesterday.toDateString()) {
            streak++; // continue streak
        } else {
            streak = 1; // reset streak
        }

        // Save update
        await setDoc(userRef, {
            ...userData,
            lastStudy: today,
            streak: streak
        });

        showPopup("🔥 Study today to maintain your streak!");
    }

    // Show stats
    document.getElementById("stats").innerHTML = `
        <h2>🔥 Current Streak: ${streak} days</h2>
        <p>Last Study: ${lastStudy || "No data"}</p>
    `;
}

// 🔔 Popup
function showPopup(message) {
    const popup = document.getElementById("popup");
    popup.textContent = message;
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 4000);
}

// Start
loadReminder();
</script>

</body>
</html>
