<!DOCTYPE html>
<html>
<head>
<title>AI Teacher ULTIMATE PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* YOUR ORIGINAL CSS (UNCHANGED) */
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}
body{display:flex;height:100vh;background:#0b1220;color:#e2e8f0;}
.sidebar{width:260px;background:#020617;padding:12px;overflow-y:auto;border-right:1px solid #1e293b;}
.new-btn{width:100%;padding:10px;margin-bottom:8px;background:#3b82f6;border:none;border-radius:8px;color:white;}
button{margin:3px;padding:10px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer;}
.panel{margin-top:10px;padding:10px;background:#0f172a;border-radius:8px;font-size:14px;}
.progress{height:6px;background:#1e293b;border-radius:10px;margin-top:5px;}
.bar{height:6px;background:#3b82f6;border-radius:10px;width:0%;}
.note{background:#1e293b;padding:6px;margin-top:5px;border-radius:6px;font-size:12px;}
.main{flex:1;display:flex;flex-direction:column;}
.topbar{padding:10px;background:#020617;display:flex;gap:10px;border-bottom:1px solid #1e293b;}
.search{flex:1;padding:8px;border-radius:8px;border:none;background:#1e293b;color:white;}
#chatBox{flex:1;overflow-y:auto;padding:15px;}
.msg{padding:12px;margin:10px 0;border-radius:12px;max-width:70%;white-space:pre-wrap;position:relative;}
.user{background:#3b82f6;color:black;margin-left:auto;}
.ai{background:#1e293b;}
.icon{position:absolute;top:6px;cursor:pointer;font-size:13px;}
.save{right:140px;}
.star{right:115px;}
.download{right:90px;}
.copy{right:65px;}
.share{right:40px;}
.speak{right:15px;}
.quiz-btn{display:block;margin-top:6px;padding:8px;background:#1e40af;border-radius:6px;cursor:pointer;}
.correct{background:#16a34a !important;}
.wrong{background:#dc2626 !important;}
.inputArea{display:flex;flex-wrap:wrap;padding:10px;background:#020617;border-top:1px solid #1e293b;}
input,select{padding:10px;border:none;border-radius:8px;margin:3px;background:#1e293b;color:white;}
input{flex:1;}

/* NEW SMALL UI ADDITIONS */
.goal{background:#1e293b;padding:6px;margin-top:5px;border-radius:6px;font-size:12px;cursor:pointer;}
.timer{margin-top:8px;font-size:14px;color:#38bdf8;}
</style>
</head>

<body>

<div class="sidebar">

<button class="new-btn" onclick="newChat()">+ New Chat</button>
<button class="new-btn" onclick="clearChat()">🧹 Clear</button>
<button class="new-btn" onclick="downloadPDF()">📄 PDF</button>
<button class="new-btn" onclick="exportTXT()">📤 TXT</button>
<button class="new-btn" onclick="showLeaderboard()">🏆 Leaderboard</button>

<!-- NEW -->
<button class="new-btn" onclick="addGoal()">🎯 Add Goal</button>
<button class="new-btn" onclick="startTimer()">⏱ Start Focus</button>

<div class="panel">
🏆 Coins: <span id="coins">0</span><br>
⚡ XP: <span id="xp">0</span><br>
⭐ Level: <span id="level">1</span><br>
📊 Questions: <span id="qCount">0</span><br>
⚠️ Weak: <span id="weak">None</span><br>
🔥 Streak: <span id="streak">0</span>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div class="timer" id="timer">⏱ 25:00</div>
</div>

<div class="panel">
<b>🎯 Goals</b>
<div id="goals"></div>
</div>

<div class="panel">
<b>💾 Saved Notes</b>
<div id="notes"></div>
</div>

</div>

<div class="main">

<div class="topbar">
<input id="search" class="search" placeholder="🔍 Search..." oninput="searchChat()">
<button onclick="summarize()">🧠 Summary</button>
</div>

<div id="chatBox"></div>

<div class="inputArea">

<select id="mode">
<option value="normal">Explain</option>
<option value="short">Short</option>
<option value="code">Code</option>
<option value="exam">Exam</option>
<option value="notes">Notes</option>
<option value="kid">Kid</option>
</select>

<input id="msg" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') send()">

<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤</button>
<button onclick="generateQuiz()">🧠 Quiz</button>
<button onclick="simpleExplain()">💡 Simple</button>
<button onclick="startExam()">⏱ Exam</button>

</div>

</div>

<script>

/* YOUR ORIGINAL VARIABLES */
let coins=0,xp=0,level=1,qCount=0;
let lastAI="";
let savedNotes=[];
let weakTopics=[];
let leaderboard = JSON.parse(localStorage.getItem("leaderboard") || "[]");

/* NEW VARIABLES */
let goals = JSON.parse(localStorage.getItem("goals") || "[]");
let streak = parseInt(localStorage.getItem("streak") || "0");

// INIT
window.onload=()=>{
updateUI();
renderNotes();
renderGoals();
updateStreak();
};

// UI
function updateUI(){
coins.innerText=coins;
xp.innerText=xp;
level.innerText=level;
qCount.innerText=qCount;
weak.innerText = weakTopics.join(", ") || "None";
streak.innerText = streak;

let percent=(xp%(level*50))/(level*50)*100;
bar.style.width=percent+"%";
}

// ===== NEW: STREAK SYSTEM =====
function updateStreak(){
let today = new Date().toDateString();
let last = localStorage.getItem("lastDay");

if(last !== today){
streak++;
localStorage.setItem("streak", streak);
localStorage.setItem("lastDay", today);
}
}

// ===== NEW: GOALS =====
function addGoal(){
let g = prompt("Enter your study goal:");
if(!g) return;
goals.push({text:g,done:false});
saveGoals();
renderGoals();
}

function renderGoals(){
goalsEl.innerHTML="";
goals.forEach((g,i)=>{
let d=document.createElement("div");
d.className="goal";
d.innerText=(g.done?"✔ ":"")+g.text;

d.onclick=()=>{
goals[i].done=!goals[i].done;
saveGoals();
renderGoals();
};

goalsEl.appendChild(d);
});
}

function saveGoals(){
localStorage.setItem("goals", JSON.stringify(goals));
}

// ===== NEW: TIMER =====
let timerInt;
function startTimer(){
let time=1500; // 25 min

clearInterval(timerInt);

timerInt=setInterval(()=>{
time--;

let m=Math.floor(time/60);
let s=time%60;

timer.innerText=`⏱ ${m}:${s<10?"0"+s:s}`;

if(time<=0){
clearInterval(timerInt);
alert("⏰ Time's up! Take a break.");
}
},1000);
}

// ===== ORIGINAL CODE CONTINUES BELOW (UNCHANGED) =====

// CHAT
function newChat(){chatBox.innerHTML="";}
function clearChat(){chatBox.innerHTML="";}

// MESSAGE
function createAIMessage(text){

let div=document.createElement("div");
div.className="msg ai";

let content=document.createElement("div");
content.innerText=text;
div.appendChild(content);

function icon(cls,icon,fn){
let s=document.createElement("span");
s.className="icon "+cls;
s.innerText=icon;
s.onclick=fn;
div.appendChild(s);
}

icon("save","💾",()=>saveNote(text));
icon("star","⭐",()=>div.style.background="#facc15");
icon("download","📥",()=>downloadText(text));
icon("copy","📋",()=>navigator.clipboard.writeText(text));
icon("share","📤",()=>navigator.clipboard.writeText(text));
icon("speak","🔊",()=>speechSynthesis.speak(new SpeechSynthesisUtterance(text)));

chatBox.appendChild(div);
return div;
}

function addUser(text){
let div=document.createElement("div");
div.className="msg user";
div.innerText=text;
chatBox.appendChild(div);
}

// SEND
async function send(){

let text=msg.value.trim();
if(!text) return;

msg.value="";
addUser(text);

coins++; xp+=5; qCount++;
if(xp>=level*50){level++;}

updateUI();

let typing=createAIMessage("Typing...");

try{
let res=await fetch("http://localhost:3000/ask",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

let data=await res.json();

lastAI=data.reply;
typing.remove();
createAIMessage(data.reply);

}catch{
typing.innerText="❌ Error";
}
}

// QUIZ
function generateQuiz(){

let question = "What is 2 + 2?";
let options = ["2","3","4","5"];
let correct = 2;

let div=document.createElement("div");
div.className="msg ai";
div.innerHTML="<b>"+question+"</b>";

options.forEach((opt,i)=>{
let btn=document.createElement("div");
btn.className="quiz-btn";
btn.innerText=opt;

btn.onclick=()=>{
if(i===correct){
btn.classList.add("correct");
coins+=10;
xp+=5;
}else{
btn.classList.add("wrong");
weakTopics.push(question);
}
updateUI();
saveLeaderboard();
};

div.appendChild(btn);
});

chatBox.appendChild(div);
}

// LEADERBOARD
function saveLeaderboard(){
leaderboard.push({score:coins});
localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
}

function showLeaderboard(){
let sorted=leaderboard.sort((a,b)=>b.score-a.score);
let txt="🏆 Leaderboard\n\n";
sorted.slice(0,5).forEach((p,i)=>{
txt+=`${i+1}. ${p.score} coins\n`;
});
alert(txt);
}

// HELPERS
function downloadText(text){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text(text,10,10);
doc.save("answer.pdf");
}

// OTHER
function simpleExplain(){
if(!lastAI) return;
msg.value="Explain simply:\n"+lastAI;
send();
}

function startExam(){alert("Exam started!");}

function summarize(){
if(!lastAI) return;
msg.value="Summarize:\n"+lastAI;
send();
}

function searchChat(){
let val=search.value.toLowerCase();
document.querySelectorAll(".msg").forEach(m=>{
m.style.display=m.innerText.toLowerCase().includes(val)?"block":"none";
});
}

// NOTES
function saveNote(text){
savedNotes.push(text);
renderNotes();
}

function renderNotes(){
notes.innerHTML="";
savedNotes.forEach(n=>{
let d=document.createElement("div");
d.className="note";
d.innerText=n;
notes.appendChild(d);
});
}

// EXPORT
function exportTXT(){
let text="";
document.querySelectorAll(".msg").forEach(m=>text+=m.innerText+"\n\n");
let blob=new Blob([text]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="chat.txt";
a.click();
}

function downloadPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
let text="";
document.querySelectorAll(".msg").forEach(m=>text+=m.innerText+"\n\n");
doc.text(text,10,10);
doc.save("chat.pdf");
}

// VOICE
function startVoice(){
const r=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
r.onresult=e=>{
msg.value=e.results[0][0].transcript;
send();
};
r.start();
}

</script>

</body>
</html>
