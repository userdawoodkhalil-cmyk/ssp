<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SSP Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #050812;
  --card: rgba(255,255,255,0.05);
  --stroke: rgba(255,255,255,0.08);
  --primary: #4db8ff;
  --text: #eaf2ff;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* 🌌 BACKGROUND GLOW */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,140,255,0.15), transparent 60%),
    radial-gradient(circle at 80% 80%, rgba(0,255,200,0.1), transparent 60%);
  z-index: -1;
}

/* 🖱️ CURSOR GLOW */
#cursorGlow {
  position: fixed;
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(77,184,255,0.2), transparent 70%);
  filter: blur(80px);
  pointer-events: none;
  transform: translate(-50%, -50%);
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 50px;
}

.logo {
  font-size: 26px;
  font-weight: 700;
  color: var(--primary);
}

.logout {
  padding: 10px 22px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  color: white;
  transition: 0.3s;
}

.logout:hover {
  background: var(--primary);
  color: black;
  box-shadow: 0 0 20px var(--primary);
}

/* MAIN */
.container {
  padding: 40px 60px;
}

/* HEADER */
.header {
  margin-bottom: 30px;
}

.header h1 {
  font-size: 36px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap: 25px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--stroke);
  border-radius: 18px;
  padding: 25px;
  backdrop-filter: blur(20px);
  transition: 0.4s;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 0 30px rgba(77,184,255,0.3);
}

/* SHINE EFFECT */
.card::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: rotate(25deg);
  top: -150%;
  left: -100%;
  transition: 0.6s;
}

.card:hover::before {
  top: 100%;
  left: 100%;
}

/* TEXT */
.card h3 {
  margin-bottom: 10px;
}

.card p {
  color: #b9d8ff;
  font-size: 14px;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #4db8ff, #00ffd5);
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #4db8ff;
}

/* PROGRESS */
.progress {
  height: 10px;
  background: #111;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 100%;
  width: 65%;
  background: linear-gradient(90deg,#4db8ff,#00ffd5);
  border-radius: 10px;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="cursorGlow"></div>

<!-- NAV -->
<div class="nav">
  <div class="logo">SSP</div>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1 id="welcome">Welcome</h1>
    <p>Stay consistent. Build your future.</p>
  </div>

  <!-- GRID -->
  <div class="grid">

    <!-- PROGRESS -->
    <div class="card">
      <h3>📊 Progress</h3>
      <p>Your study consistency today</p>

      <div class="progress">
        <div class="progress-bar"></div>
      </div>

      <div class="stats">
        <span>Completed: 65%</span>
        <span>🔥 Streak: 5 days</span>
      </div>

      <button class="btn">View Details</button>
    </div>

    <!-- AI -->
    <div class="card">
      <h3>🤖 AI Learning</h3>
      <p>Ask anything and learn instantly with AI</p>
      <button class="btn" onclick="openAI()">Open AI School</button>
    </div>

    <!-- PLANNER -->
    <div class="card">
      <h3>📅 Planner</h3>
      <p>Organize your daily study schedule</p>
      <button class="btn">Open Planner</button>
    </div>

    <!-- NOTES -->
    <div class="card">
      <h3>📝 Notes</h3>
      <p>Save and manage important notes</p>
      <button class="btn">Open Notes</button>
    </div>

  </div>

</div>

<script>

/* 🔐 PROTECT */
if (!localStorage.getItem("currentUser")) {
  window.location.href = "login.html";
}

/* USER */
const user = localStorage.getItem("currentUser");
document.getElementById("welcome").innerText = "Welcome " + user;

/* NAVIGATION */
function openAI() {
  window.location.href = "ai-school.html";
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("currentUser");
  window.location.href = "login.html";
}

/* CURSOR GLOW */
const glow = document.getElementById("cursorGlow");
document.addEventListener("mousemove", e => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

</script>

</body>
</html>
