<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SSP - Smart Study Planner</title>

<!-- 🔥 PREMIUM FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #070b14;
  --card: rgba(255,255,255,0.05);
  --stroke: rgba(255,255,255,0.1);
  --primary: #4db8ff;
  --text: #eaf2ff;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* 🌌 animated gradient background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,140,255,0.2), transparent 60%),
    radial-gradient(circle at 80% 80%, rgba(0,255,200,0.1), transparent 60%);
  animation: moveBg 10s infinite alternate ease-in-out;
}

@keyframes moveBg {
  from { transform: scale(1); }
  to { transform: scale(1.08); }
}

/* ✨ GLITTERS */
.glitter {
  position: fixed;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }
  to {
    transform: translateY(-10vh);
    opacity: 1;
  }
}

/* 🖱️ cursor glow */
#cursorGlow {
  position: fixed;
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(77,184,255,0.15), transparent 70%);
  filter: blur(90px);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 1;
}

/* 🧊 containers */
.container, .container1 {
  width: 420px;
  padding: 45px;
  border-radius: 20px;

  background: var(--card);
  backdrop-filter: blur(30px);

  border: 1px solid var(--stroke);

  box-shadow: 0 30px 100px rgba(0,0,0,0.8);

  position: absolute;
  z-index: 2;

  transition: 0.4s ease;
}

.container:hover,
.container1:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 0 40px rgba(77,184,255,0.3);
}

.container { display: none; }

/* title */
h2 {
  margin-bottom: 20px;
  text-align: center;
  font-weight: 600;
}

/* inputs */
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;

  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);

  background: rgba(0,0,0,0.6);
  color: white;
  outline: none;

  transition: 0.3s;
}

input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 15px rgba(77,184,255,0.3);
  transform: scale(1.02);
}

/* buttons */
button {
  width: 100%;
  padding: 13px;

  border-radius: 10px;
  border: 1px solid rgba(77,184,255,0.4);

  background: linear-gradient(135deg, #0b1a2a, #081220);
  color: white;

  font-weight: 600;
  cursor: pointer;

  margin-top: 8px;
  transition: 0.3s;
}

button:hover {
  background: var(--primary);
  color: #001018;
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(77,184,255,0.4);
}

/* switch */
.switch-btn {
  background: none;
  border: none;
  color: #7fa6c7;
  margin-top: 10px;
}

.switch-btn:hover {
  color: #4db8ff;
}

/* popup */
#popupOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 25px;
  z-index: 999;
}

.popup {
  width: 320px;
  padding: 20px;
  border-radius: 14px;
  background: rgba(20,25,40,0.9);
  backdrop-filter: blur(20px);
}

.footer {
  width: 100%;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.1);
  color: #ccc;
  padding: 40px 20px 10px;
  position: absolute;
  bottom: 0;
  left: 0;
}

.footer-container {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  gap: 20px;
}

.footer-section {
  max-width: 200px;
}

.footer-section h3,
.footer-section h4 {
  color: white;
  margin-bottom: 10px;
}

.footer-section a {
  display: block;
  color: #aaa;
  text-decoration: none;
  margin-bottom: 5px;
  transition: 0.3s;
}

.footer-section a:hover {
  color: #4db8ff;
}

.footer-bottom {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: #777;
}


/* ✨ generate glitters */
</style>
</head>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-container">

    <div class="footer-section">
      <h3>📚 SSP</h3>
      <p>Smart Study Planner helps students stay focused, organized, and ahead.</p>
    </div>

    <div class="footer-section">
      <h4>Quick Links</h4>
      <a href="#">Home</a>
      <a href="#">Dashboard</a>
      <a href="#">Notes</a>
      <a href="#">Planner</a>
    </div>

    <div class="footer-section">
      <h4>Contact</h4>
      <p>Email: support@ssp.com</p>
      <p>Phone: +92 300 0000000</p>
    </div>

    <div class="footer-section">
      <h4>Follow</h4>
      <a href="#">Instagram</a>
      <a href="#">YouTube</a>
      <a href="#">GitHub</a>
    </div>

  </div>

  <div class="footer-bottom">
    © 2026 SSP | All Rights Reserved
  </div>
</footer>

<body>

<div id="cursorGlow"></div>

<!-- ✨ GLITTER CONTAINER -->
<script>

for (let i = 0; i < 40; i++) {
  const g = document.createElement("div");
  g.className = "glitter";
  g.style.left = Math.random() * 100 + "vw";
  g.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(g);
}
</script>

<!-- 🔊 SOUNDS -->
<audio id="loginSound" src="assets/sounds/login.mp3" preload="auto"></audio>
<audio id="logoutSound" src="assets/sounds/logout.mp3" preload="auto"></audio>

<!-- POPUP -->
<div id="popupOverlay">
  <div class="popup" id="popupBox">
    <div id="popupMessage">Message</div>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<!-- LOGIN -->
<div class="container1" id="loginBox">
  <h2>Login</h2>

  <input type="email" id="login-email" placeholder="Email">
  <input type="password" id="login-password" placeholder="Password">

  <button onclick="loginUser()">Login</button>

  <button class="switch-btn" onclick="showRegister()">
    Create new account
  </button>
</div>

<!-- REGISTER -->
<div class="container" id="registerBox">
  <h2>Create account</h2>

  <input type="email" id="register-email" placeholder="Email">
  <input type="password" id="register-password" placeholder="Password">

  <button onclick="registerUser()">Register</button>

  <button class="switch-btn" onclick="showLogin()">
    Back to login
  </button>
</div>

<!-- ⚠️ YOUR SCRIPT (UNCHANGED) -->
<script type="module">
import {
  auth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  db,
  doc,
  setDoc
} from "./assets/js/firebase.js";

async function register(email, password) {
  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {
      progress: {},
      weakTopics: {}
    });

    showPopup("Account created!", "success");

  } catch (err) {
    showPopup(getErrorMessage(err), "error");
  }
}

async function login(email, password) {
  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);

    document.getElementById("loginSound").play();

    localStorage.setItem("currentUser", userCredential.user.uid);

    showPopup("Login successful!", "success");

    setTimeout(() => {
      window.location.href = "dashboard/dashboard.html";
    }, 1200);

  } catch (err) {
    showPopup(getErrorMessage(err), "error");
  }
}

window.registerUser = () => {
  const email = document.getElementById("register-email").value.trim();
  const password = document.getElementById("register-password").value.trim();
  register(email, password);
};

window.loginUser = () => {
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value.trim();
  login(email, password);
};

window.showRegister = () => {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("registerBox").style.display = "block";
};

window.showLogin = () => {
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("registerBox").style.display = "none";
};

window.showPopup = (msg) => {
  document.getElementById("popupMessage").innerText = msg;
  document.getElementById("popupOverlay").style.display = "flex";
};

window.closePopup = () => {
  document.getElementById("popupOverlay").style.display = "none";
};
</script>

<script>
const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove", (e) => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});


//own branding 

function getErrorMessage(error) {
  const code = error.code;

  switch (code) {
    case "auth/email-already-in-use":
      return "Email is Already in use.";

    case "auth/invalid-email":
      return " Please enter a valid email.";

    case "auth/weak-password":
      return " Password should be at least 6 characters.";

    case "auth/user-not-found":
      return " No account found with this email.";

    case "auth/wrong-password":
      return " Incorrect password.";

    case "auth/too-many-requests":
      return " Too many attempts. Try again later.";

    default:
      return " Something went wrong. Please try again.";
  }
}
</script>

</body>
</html>
